<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traffic Rule Violation Detection</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="container">

<h1>🚦 Real-Time Traffic Rule Violation Detection</h1>
<p>Upload CCTV / traffic video for AI-based violation analysis</p>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="video" required>
    <button type="submit">Process Video</button>
</form>

{% if done %}
<div class="result">

<h2>Processing Complete ✅</h2>

<video width="800" controls autoplay>
    <source src="/static/result.mp4?v={{ range(1,9999)|random }}" type="video/mp4">
</video>

<br><br>

<a href="/static/result.mp4" download>
    <button>Download Result</button>
</a>

<br><br><br>

<h2>📸 Violation Evidence & Plate Preview</h2>

<div class="gallery">

{% for item in plates %}
<div class="card">

    <img src="{{ url_for('evidence_file', filename=item[0]) }}" width="280">

    <br><br>

    <img src="{{ url_for('evidence_file', filename=item[1]) }}" width="180">

    <p><b>Plate Text:</b> {{ item[2] }}</p>

</div>
{% endfor %}

</div>

</div>
{% endif %}

</div>

</body>
</html>
